version: "3.9"

services:
  # ------------------------------------------------------------------ #
  #  Storage — PostgreSQL 16 (dedup store + stats)                      #
  # ------------------------------------------------------------------ #
  storage:
    image: postgres:16-alpine
    container_name: pubsub-storage
    restart: unless-stopped
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ------------------------------------------------------------------ #
  #  Broker — Redis 7 (in-memory queue)                                 #
  # ------------------------------------------------------------------ #
  broker:
    image: redis:7-alpine
    container_name: pubsub-broker
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - broker_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    # No external ports — internal only

  # ------------------------------------------------------------------ #
  #  Aggregator — FastAPI + asyncpg (idempotent consumer)               #
  # ------------------------------------------------------------------ #
  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    image: uts-aggregator:latest
    container_name: pubsub-aggregator
    restart: unless-stopped
    depends_on:
      storage:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:pass@storage:5432/db
      BROKER_URL: redis://broker:6379
      NUM_WORKERS: "4"
    ports:
      - "8080:8080"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  # ------------------------------------------------------------------ #
  #  Publisher — event generator (includes duplicates)                  #
  # ------------------------------------------------------------------ #
  publisher:
    build:
      context: ./publisher
      dockerfile: Dockerfile
    image: uts-publisher:latest
    container_name: pubsub-publisher
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      TARGET_URL: http://aggregator:8080/publish
      TOTAL_EVENTS: "20000"
      DUPLICATE_RATE: "0.35"
      BATCH_SIZE: "50"
      CONCURRENCY: "8"
    networks:
      - internal
    restart: "no"   # run once then exit

# ------------------------------------------------------------------ #
#  Volumes (named — persists across container recreate)               #
# ------------------------------------------------------------------ #
volumes:
  pg_data:
    name: pubsub_pg_data
  broker_data:
    name: pubsub_broker_data

# ------------------------------------------------------------------ #
#  Networks — isolated internal; no egress to public internet         #
# ------------------------------------------------------------------ #
networks:
  internal:
    driver: bridge
    internal: false   # allow localhost → 8080 for demo; broker/storage remain unexposed
